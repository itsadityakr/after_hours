    <script>
      // Resolve the stored theme before first paint so there is no flash.
      try {
        const stored = JSON.parse(localStorage.getItem('afterhours:theme') || '"system"')
        const dark =
          stored === 'dark' ||
          (stored === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      } catch {}
    </script>
